<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criteria Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-video"></i> Criteria Generator</h1>
            <p>Paste your JSON video features data and analyze</p>
        </header>

        <main class="main-content">
            <section class="input-section">
                <div class="input-card">
                    <h2>📋 Paste JSON Data</h2>
                    <p class="subtitle">Copy and paste your JSON video feature data below</p>
                    
                    <textarea id="jsonInput" class="json-textarea" placeholder='Paste your JSON here, e.g:
{
    "file_name": "video.mp4",
    "file_type": "mp4",
    "aspect_ratio": 0.5625,
    "video_width": 720,
    "video_height": 1280,
    "video_duration": 15.0,
    "file_size": 2620327,
    "music": "TRUE",
    "parents_present": "TRUE",
    "editing_and_visual_effects": "TRUE",
    "visual_pace": "fast",
    "number_of_editing_cuts_or_visual_transitions": 7
}'></textarea>

                    <div class="settings">
                        <label for="watThreshold">WAT Threshold (seconds):</label>
                        <input type="number" id="watThreshold" value="2.0" step="0.1" min="0">
                        <span class="help-text">Timing threshold for early appearance criteria</span>
                    </div>

                    <div class="button-group">
                        <button id="analyzeBtn" class="btn btn-primary">
                            <i class="fas fa-play-circle"></i> Analyze
                        </button>
                        <button id="clearBtn" class="btn btn-secondary">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                    </div>
                </div>
            </section>

            <div id="loadingIndicator" class="loading-indicator hidden">
                <div class="spinner"></div>
                <p>Processing your data...</p>
            </div>

            <div id="errorMessage" class="error-message hidden">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <section id="resultsSection" class="results-section hidden">
                <div class="results-header">
                    <h2><i class="fas fa-check-circle"></i> Analysis Results</h2>
                    <div class="action-buttons">
                        <button id="printBtn" class="btn btn-secondary" title="Print results">
                            <i class="fas fa-print"></i> Print
                        </button>
                        <button id="downloadBtn" class="btn btn-secondary" title="Download as JSON">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </div>
                </div>

                <div id="resultsContainer"></div>
            </section>
        </main>

        <footer class="footer">
            <p>Criteria Generator v1.0 | Video Feature Analysis Tool</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
