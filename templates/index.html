<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criteria Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-video"></i> Criteria Generator</h1>
            <p>Analyze video features across multiple platforms</p>
        </header>

        <main class="main-content">
            <section class="upload-section">
                <div class="upload-card">
                    <h2>Upload Video Features File</h2>
                    <p class="subtitle">Supported formats: JSON, Excel (.xlsx, .xls), CSV</p>
                    
                    <div class="upload-area" id="uploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p class="upload-text">Drag and drop your file here or click to browse</p>
                        <input type="file" id="fileInput" class="file-input" accept=".json,.xlsx,.xls,.csv" hidden>
                    </div>

                    <div class="settings">
                        <label for="watThreshold">WAT Threshold:</label>
                        <input type="number" id="watThreshold" value="2.0" step="0.1" min="0">
                    </div>

                    <button id="analyzeBtn" class="btn btn-primary" disabled>
                        <i class="fas fa-play-circle"></i> Analyze
                    </button>
                </div>
            </section>

            <div id="loadingIndicator" class="loading-indicator hidden">
                <div class="spinner"></div>
                <p>Processing your file...</p>
            </div>

            <div id="errorMessage" class="error-message hidden"></div>

            <section id="resultsSection" class="results-section hidden">
                <div class="results-header">
                    <h2>Analysis Results</h2>
                </div>
                <div id="resultsContainer"></div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
